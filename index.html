<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Devyn's Final Project</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">

    <header>
        <h1>Robinson Final Project</h1>
        <button id="themeToggle">Toggle Mode</button>
    </header>

    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#game">Game</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <main>

        <section id="home">
            <h2>Welcome Home</h2>
            <p>Welcome to the home page!</p>
        </section>

        <section id="about">
            <h2>About</h2>
            <p>Learn more about us! </p>
        </section>

        <section id="game">
            <h2>Number Challenge</h2>
            <p>Pick a number from 1 to 10 and see if you can match the system!</p>

            <form id="gameForm">
                <label for="guessInput">Your Number:</label>
                <input type="number" id="guessInput" min="1" max="10" required>

                <span class="error" id="guessError"></span>

                <button type="submit">Test Your Luck!</button>
            </form>

            <div id="resultDisplay">
                <p>Your Guess: <span id="playerGuess">-</span></p>
                <p>Generated Number: <span id="computerNumber">-</span></p>
                <p id="feedbackMessage"></p>
            </div>
            </section>

       

        <section id="contact">
            <h2>Contact Us</h2>

        <form id="contactForm">

          <label for="name">Full Name:</label>
          <input type="text" id="name">
          <span class="error" id="nameError"></span>

          <label for="email">Email:</label>
          <input type="text" id="email">
          <span class="error" id="emailError"></span>

          <label for="phone">Phone:</label>
          <input type="text" id="phone">
          <span class="error" id="phoneError"></span>

          <label>Preferred Contact:</label>
          <input type="radio" name="contactMethod" value="email" required> Email
          <input type="radio" name="contactMethod" value="phone" required> Phone
          <span class="error" id="contactError"></span>

          <label for="comments">Comments:</label>
          <textarea id="comments"></textarea>
          <span class="error" id="commentsError"></span>

          <button type="submit">Submit</button>
        </form>

            <p id="formMessage"></p>
        </section>
    </main>

<footer> 
    <p>&copy; 2026 My Company</p>
</footer>

</div>
</body>


</html>
